<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4f46e5;
  --primary-dark: #4338ca;
  --primary-light: #eef2ff;
  --success: #059669;
  --success-light: #d1fae5;
  --danger: #dc2626;
  --danger-light: #fee2e2;
  --warning: #d97706;
  --warning-light: #fef3c7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --radius: 12px;
  --radius-sm: 8px;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-100); color: var(--gray-800); line-height: 1.5; }

/* TOPBAR */
.topbar { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 18px 24px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-md); }
.topbar-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-logo { display: flex; align-items: center; gap: 8px; }

/* TABS */
.tab-bar { background: white; display: flex; max-width: 640px; margin: 0 auto; border-bottom: 1px solid var(--gray-200); }
.tab { flex: 1; padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--gray-500); cursor: pointer; text-align: center; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--primary); background: var(--primary-light); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* PAGE */
.page { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
.page.active { display: block; }

/* CARDS */
.card { background: white; border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--gray-100); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
.stat-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--gray-100); text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card .stat-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-card .stat-value { font-size: 22px; font-weight: 700; color: var(--gray-800); }
.stat-card.primary .stat-value { color: var(--primary); }
.stat-card.success .stat-value { color: var(--success); }
.stat-card.danger .stat-value { color: var(--danger); }
.stat-card.purple .stat-value { color: var(--purple); }
.stat-card .stat-icon { font-size: 24px; margin-bottom: 6px; }

/* STAT ROW */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
.stat-row:last-child { border-bottom: none; }
.stat-row .label { font-size: 14px; color: var(--gray-600); }
.stat-row .value { font-size: 16px; font-weight: 700; color: var(--gray-800); }
.stat-row .value.danger { color: var(--danger); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; width: 100%; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #047857; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-secondary { background: var(--gray-200); color: var(--gray-700); }
.btn-secondary:hover { background: var(--gray-300); }
.btn-ghost { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-200); }
.btn-ghost:hover { background: var(--gray-50); }
.btn-sm { padding: 7px 12px; font-size: 12px; width: auto; }

/* FORMS */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s; background: white; color: var(--gray-800);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-input::placeholder { color: var(--gray-400); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; margin-bottom: 0; }
.form-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

/* SEARCH */
.search-box { position: relative; margin-bottom: 12px; }
.search-box input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 16px; }

/* FILTER */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
.filter-row select { flex: 1; }

/* CUSTOMER LIST */
.customer-item { padding: 14px 12px; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.15s; border-radius: var(--radius-sm); margin-bottom: 4px; }
.customer-item:hover { background: var(--gray-50); }
.customer-item:last-child { border-bottom: none; }
.customer-row { display: flex; align-items: center; gap: 12px; }
.customer-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.customer-info { flex: 1; min-width: 0; }
.customer-name { font-size: 15px; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.customer-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.customer-right { text-align: right; flex-shrink: 0; }
.customer-balance { font-size: 15px; font-weight: 700; color: var(--gray-800); }
.customer-balance.zero { color: var(--success); }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 4px; }
.badge.active { background: var(--success-light); color: var(--success); }
.badge.paid { background: var(--primary-light); color: var(--primary); }
.badge.overdue { background: var(--danger-light); color: var(--danger); }

/* DAY GROUPS */
.day-group { margin-bottom: 16px; }
.day-header { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: white; }
.day-header.sun { background: linear-gradient(135deg, #ef4444, #dc2626); }
.day-header.mon { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.day-header.tue { background: linear-gradient(135deg, #22c55e, #16a34a); }
.day-header.wed { background: linear-gradient(135deg, #f97316, #ea580c); }
.day-header.thu { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
.day-header.fri { background: linear-gradient(135deg, #14b8a6, #0d9488); }
.day-header.sat { background: linear-gradient(135deg, #ec4899, #db2777); }
.day-count { background: rgba(255,255,255,0.25); padding: 1px 7px; border-radius: 10px; font-size: 10px; }

/* DETAIL PAGE */
.detail-header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--gray-100); margin-bottom: 16px; }
.detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 24px; margin: 0 auto 10px; }
.detail-name { font-size: 20px; font-weight: 700; color: var(--gray-800); }
.detail-meta { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
.mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.mini-stat { background: var(--gray-50); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; border: 1px solid var(--gray-100); }
.mini-stat .label { font-size: 9px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.3px; }
.mini-stat .value { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-top: 3px; }
.mini-stat.success .value { color: var(--success); }
.mini-stat.danger .value { color: var(--danger); }
.mini-stat.purple .value { color: var(--purple); }

/* EMI SECTION */
.emi-card { background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; border: 1px solid var(--gray-100); }
.emi-header { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.emi-item { display: flex; align-items: center; padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 4px; cursor: pointer; transition: background 0.15s; border: 1.5px solid transparent; }
.emi-item:hover { background: white; border-color: var(--gray-200); }
.emi-item.paid { background: var(--success-light); border-color: #a7f3d0; cursor: default; }
.emi-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; flex-shrink: 0; }
.emi-item.paid input[type="checkbox"] { opacity: 0.5; cursor: default; }
.emi-item label { flex: 1; margin-left: 10px; cursor: pointer; font-size: 13px; }
.emi-item.paid label { cursor: default; color: var(--gray-500); }
.emi-item .tick { color: var(--success); font-weight: 700; margin-left: 6px; }
.emi-item .due-date { font-size: 11px; color: var(--gray-400); }

/* PROGRESS BAR */
.progress-wrap { margin: 12px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
.progress-bar { background: var(--gray-200); border-radius: 10px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #34d399); border-radius: 10px; transition: width 0.4s ease; }

/* HISTORY */
.history-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
.history-item:last-child { border-bottom: none; }
.history-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.history-icon.loan { background: var(--danger-light); }
.history-icon.pay { background: var(--success-light); }
.history-info { flex: 1; margin-left: 10px; }
.history-type { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.history-date { font-size: 11px; color: var(--gray-400); }
.history-amount { font-size: 14px; font-weight: 700; color: var(--gray-800); }
.history-amount.loan { color: var(--danger); }
.history-amount.pay { color: var(--success); }

/* LOAN CARD */
.loan-item { background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; border: 1px solid var(--gray-100); }
.loan-row { display: flex; justify-content: space-between; align-items: center; }
.loan-amount { font-size: 16px; font-weight: 700; color: var(--gray-800); }
.loan-date { font-size: 12px; color: var(--gray-400); }
.loan-detail { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
.loan-total { font-size: 13px; font-weight: 600; color: var(--purple); margin-top: 6px; }
.actual-given { font-size: 12px; color: var(--success); font-weight: 600; }

/* TODAY STAT */
.today-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; color: white; }
.today-card .today-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.today-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.today-stat { text-align: center; }
.today-stat .t-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.today-stat .t-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
.today-stat .t-value.green { color: #34d399; }
.today-stat .t-value.blue { color: #60a5fa; }
.today-stat .t-value.purple { color: #a78bfa; }

/* FORM IMPROVED */
.loan-form-card { background: var(--gray-50); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 10px; border: 1px solid var(--gray-200); }
.loan-form-card .lf-title { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.loan-form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end; }
.loan-form-row .lf-group { flex: 1; }
.loan-form-row .lf-group label { display: block; font-size: 10px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.loan-form-row .lf-group input { width: 100%; padding: 8px 10px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; background: white; }
.loan-form-row .lf-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.loan-form-preview { background: var(--success-light); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--success); margin-bottom: 10px; display: flex; justify-content: space-between; }

/* PAYMENT ITEM */
.pay-item { display: flex; align-items: center; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; border: 1.5px solid var(--gray-200); background: white; transition: all 0.15s; cursor: pointer; }
.pay-item:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
.pay-item.paid { background: var(--success-light); border-color: #a7f3d0; cursor: default; }
.pay-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--success); cursor: pointer; flex-shrink: 0; }
.pay-item.paid input[type="checkbox"] { opacity: 0.4; cursor: default; }
.pay-item .pay-info { flex: 1; margin-left: 12px; }
.pay-item .pay-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.pay-item .pay-date { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
.pay-item .pay-amount { font-size: 15px; font-weight: 700; color: var(--gray-800); }
.pay-item.paid .pay-amount { color: var(--success); }
.pay-item .pay-tick { color: var(--success); font-weight: 700; font-size: 16px; margin-left: 8px; }
.pay-item .pay-edit { margin-left: 8px; cursor: pointer; color: var(--gray-400); font-size: 14px; padding: 4px; border-radius: 4px; transition: all 0.15s; }
.pay-item .pay-edit:hover { color: var(--primary); background: var(--primary-light); }
.pay-item .pay-del { margin-left: 4px; cursor: pointer; color: var(--gray-400); font-size: 14px; padding: 4px; border-radius: 4px; transition: all 0.15s; }
.pay-item .pay-del:hover { color: var(--danger); background: var(--danger-light); }

/* ACTION BAR */
.action-bar { display: flex; gap: 8px; margin-bottom: 14px; }
.action-bar .btn { flex: 1; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-text { font-size: 14px; margin-bottom: 16px; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--gray-100); margin: 14px 0; }

/* SECTIONS */
.section { margin-bottom: 16px; }
.section-header { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-left: 2px; }

/* TOGGLE */
.toggle-form { background: var(--gray-50); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; border: 1px solid var(--gray-100); }
.toggle-form .form-input { border-color: var(--gray-300); }

/* BACK BUTTON */
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--gray-500); cursor: pointer; margin-bottom: 14px; padding: 6px 0; transition: color 0.2s; }
.back-btn:hover { color: var(--primary); }

/* RESPONSIVE */
@media (min-width: 480px) {
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
  .mini-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
<div class="topbar-inner">
<div class="topbar-logo">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="rgba(255,255,255,0.2)"/><path d="M12 6v12M9 9l3-3 3 3M9 15l3 3 3-3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
<h1>Loan Manager</h1>
</div>
</div>
</div>

<!-- TABS -->
<div class="tab-bar">
<div class="tab active" data-tab="dashboard" onclick="switchTab(this)">Dashboard</div>
<div class="tab" data-tab="customers" onclick="switchTab(this)">Customers</div>
</div>

<!-- DASHBOARD PAGE -->
<div id="page-dashboard" class="page active">
<div class="today-card">
<div class="today-title">📅 Today's Summary</div>
<div class="today-grid">
<div class="today-stat">
<div class="t-label">Given Today</div>
<div class="t-value blue" id="todayGiven">₹0</div>
</div>
<div class="today-stat">
<div class="t-label">Repaid Today</div>
<div class="t-value green" id="todayPaid">₹0</div>
</div>
<div class="today-stat">
<div class="t-label">Profit Today</div>
<div class="t-value purple" id="todayProfit">₹0</div>
</div>
</div>
</div>

<div class="stat-grid">
<div class="stat-card primary">
<div class="stat-icon">👥</div>
<div class="stat-label">Customers</div>
<div class="stat-value" id="statCustomers">0</div>
</div>
<div class="stat-card">
<div class="stat-icon">💰</div>
<div class="stat-label">Actual Given</div>
<div class="stat-value" id="statLoanGiven">₹0</div>
</div>
<div class="stat-card success">
<div class="stat-icon">✅</div>
<div class="stat-label">Repayment</div>
<div class="stat-value" id="statRepayment">₹0</div>
</div>
<div class="stat-card purple">
<div class="stat-icon">📈</div>
<div class="stat-label">Profit</div>
<div class="stat-value" id="statProfit">₹0</div>
</div>
</div>

<div class="card">
<div class="card-header">
<span class="card-title">Pending Overview</span>
</div>
<div class="stat-row">
<span class="label">Total Pending</span>
<span class="value danger" id="statPending">₹0</span>
</div>
<div class="stat-row">
<span class="label">Active Customers</span>
<span class="value" id="statPendingCustomers">0</span>
</div>
<div class="stat-row">
<span class="label">Settled Customers</span>
<span class="value" id="statSettledCustomers">0</span>
</div>
</div>

<div class="card">
<div class="card-title" style="margin-bottom:12px;">Quick Actions</div>
<button class="btn btn-primary" onclick="switchTab(document.querySelector('[data-tab=customers]'));setTimeout(showAddForm,100)">
+ Add New Customer
</button>
</div>
</div>

<!-- CUSTOMERS PAGE -->
<div id="page-customers" class="page">
<div id="view-list">
<div class="search-box">
<span class="search-icon">🔍</span>
<input id="searchInput" class="form-input" placeholder="Search by name or phone..." oninput="renderCustomerList()">
</div>
<div class="filter-row">
<select id="dayFilter" class="form-select" onchange="renderCustomerList()">
<option value="">All Days</option>
<option value="0">Sunday</option>
<option value="1">Monday</option>
<option value="2">Tuesday</option>
<option value="3">Wednesday</option>
<option value="4">Thursday</option>
<option value="5">Friday</option>
<option value="6">Saturday</option>
</select>
</div>
<div id="customerList"></div>
</div>

<div id="view-form" style="display:none;">
<div class="back-btn" onclick="closeForm()">← Back</div>
<div class="card">
<div id="formTitle" class="card-title" style="margin-bottom:14px;">New Customer</div>
<div class="form-group">
<label class="form-label">Full Name *</label>
<input id="fName" class="form-input" placeholder="Enter customer name">
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Phone</label>
<input id="fPhone" class="form-input" placeholder="Phone number">
</div>
<div class="form-group">
<label class="form-label">Day *</label>
<select id="fDay" class="form-select">
<option value="">Select Day</option>
<option value="0">Sunday</option>
<option value="1">Monday</option>
<option value="2">Tuesday</option>
<option value="3">Wednesday</option>
<option value="4">Thursday</option>
<option value="5">Friday</option>
<option value="6">Saturday</option>
</select>
</div>
</div>
<div class="form-group">
<label class="form-label">Address</label>
<input id="fAddress" class="form-input" placeholder="Address">
</div>
<div class="form-group">
<label class="form-label">Notes</label>
<textarea id="fNote" class="form-textarea" placeholder="Additional notes..." rows="2"></textarea>
</div>
<button class="btn btn-primary" onclick="saveCustomer()" id="saveBtn">Save Customer</button>
</div>
</div>

<div id="view-detail" style="display:none;">
<div class="back-btn" onclick="closeDetail()">← Back to List</div>
<div id="detailContent"></div>
</div>
</div>

<script>
let customers = JSON.parse(localStorage.getItem('loanCustomers')) || [];
let selectedIdx = null;
let editingCustIdx = null;

function save() { localStorage.setItem('loanCustomers', JSON.stringify(customers)); }

function switchTab(el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  let tab = el.dataset.tab;
  document.getElementById('page-' + tab).classList.add('active');
  el.classList.add('active');
  if (tab === 'dashboard') updateDashboard();
  if (tab === 'customers') renderCustomerList();
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function calculate(c) {
  let totalGiven = c.loans.reduce((a, b) => a + b.amount, 0);
  let totalCharges = c.loans.reduce((a, b) => a + (b.charges || 0), 0);
  let actualGiven = c.loans.reduce((a, b) => a + (b.amount - (b.charges || 0)), 0);
  let interest = c.loans.reduce((a, b) => {
    let ag = b.amount - (b.charges || 0);
    return a + (ag * (b.interest || 0) / 100);
  }, 0);
  let totalRepayable = actualGiven + interest + totalCharges;
  let paid = c.payments.reduce((a, b) => a + b.amount, 0);
  let excess = Math.max(0, paid - totalRepayable);
  let balance = Math.max(0, totalRepayable - paid);
  let profit = totalCharges + interest + excess;
  return { totalGiven, totalCharges, actualGiven, interest, paid, balance, profit, excess };
}

function getStatus(c) {
  let calc = calculate(c);
  return calc.balance <= 0 ? 'paid' : 'active';
}

function closeForm() {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
}

function closeDetail() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  selectedIdx = null;
}

function showAddForm() {
  editingCustIdx = null;
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('formTitle').textContent = 'New Customer';
  document.getElementById('saveBtn').textContent = 'Save Customer';
  document.getElementById('fName').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('fAddress').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fDay').value = new Date().getDay().toString();
  document.getElementById('fName').focus();
}

function saveCustomer() {
  let name = document.getElementById('fName').value.trim();
  let phone = document.getElementById('fPhone').value.trim();
  let address = document.getElementById('fAddress').value.trim();
  let day = document.getElementById('fDay').value;
  let note = document.getElementById('fNote').value.trim();

  if (!name) return alert('Enter customer name');
  if (!day) return alert('Select the day of the week');

  if (editingCustIdx !== null) {
    let c = customers[editingCustIdx];
    c.name = name; c.phone = phone; c.address = address; c.note = note;
  } else {
    let now = new Date();
    let currentDay = now.getDay();
    let diff = parseInt(day) - currentDay;
    let targetDate = new Date(now);
    targetDate.setDate(now.getDate() + diff);
    targetDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
    customers.push({ name, phone, address, note, loans: [], payments: [], createdAt: targetDate.toISOString() });
  }

  save();
  closeForm();
  renderCustomerList();
}

function deleteCustomer(i) {
  if (!confirm('Delete ' + customers[i].name + '? This cannot be undone.')) return;
  customers.splice(i, 1);
  save();
  closeDetail();
  renderCustomerList();
}

function renderCustomerList() {
  let search = document.getElementById('searchInput').value.toLowerCase();
  let dayFilter = document.getElementById('dayFilter').value;
  let list = document.getElementById('customerList');
  list.innerHTML = '';

  let filtered = customers.filter(c => {
    let matchesSearch = c.name.toLowerCase().includes(search) || c.phone.includes(search);
    let matchesDay = dayFilter === '' || (c.createdAt && new Date(c.createdAt).getDay() === +dayFilter);
    return matchesSearch && matchesDay;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">No customers found</div><button class="btn btn-primary btn-sm" onclick="showAddForm()" style="width:auto;display:inline-flex;">+ Add Customer</button></div>';
    return;
  }

  let dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  let dayClasses = ['sun','mon','tue','wed','thu','fri','sat'];
  let grouped = {}; dayNames.forEach(d => grouped[d] = []);
  filtered.forEach(c => {
    let day = c.createdAt ? dayNames[new Date(c.createdAt).getDay()] : 'Unknown';
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(c);
  });

  dayNames.forEach((day, di) => {
    let dayCustomers = grouped[day];
    if (!dayCustomers || dayCustomers.length === 0) return;
    if (dayFilter !== '' && di !== +dayFilter) return;

    let daySection = document.createElement('div');
    daySection.className = 'day-group';

    let dayHeader = document.createElement('div');
    dayHeader.className = 'day-header ' + dayClasses[di];
    dayHeader.innerHTML = day + ' <span class="day-count">' + dayCustomers.length + '</span>';
    daySection.appendChild(dayHeader);

    dayCustomers.forEach(c => {
      let i = customers.indexOf(c);
      let calc = calculate(c);
      let status = getStatus(c);
      let div = document.createElement('div');
      div.className = 'customer-item';
      div.onclick = () => showCustomerDetail(i);
      div.innerHTML = `
        <div class="customer-row">
          <div class="customer-avatar">${getInitials(c.name)}</div>
          <div class="customer-info">
            <div class="customer-name">${c.name}</div>
            <div class="customer-meta">${c.phone || 'No phone'} ${c.address ? '· ' + c.address : ''}</div>
          </div>
          <div class="customer-right">
            <div class="customer-balance ${calc.balance === 0 ? 'zero' : ''}">₹${calc.balance.toLocaleString()}</div>
            <span class="badge ${status}">${status === 'paid' ? 'Settled' : 'Pending'}</span>
          </div>
        </div>`;
      daySection.appendChild(div);
    });

    list.appendChild(daySection);
  });
}

function showCustomerDetail(i) {
  selectedIdx = i;
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  renderDetail();
}

function renderDetail() {
  let c = customers[selectedIdx];
  let calc = calculate(c);
  let status = getStatus(c);

  // Build EMI checklist
  let emiListHtml = '';
  c.loans.forEach((l, li) => {
    if (!l.emi || !l.emiCount) return;
    let repayable = l.emi * l.emiCount;
    let loanPayments = c.payments.filter(p => p.loanIdx === li);

    emiListHtml += `<div class="emi-card">
      <div class="emi-header">💰 Loan ₹${l.amount.toLocaleString()} · ${l.interest}% interest</div>`;

    for (let e = 1; e <= l.emiCount; e++) {
      let emiDate = new Date(l.date);
      emiDate.setDate(emiDate.getDate() + (e - 1) * 7);
      let emiDateStr = emiDate.toISOString().split('T')[0];
      let isPaid = loanPayments.some(p => p.emiNum === e || p.date === emiDateStr);
      let cls = isPaid ? 'paid' : '';
      let disabled = isPaid ? 'disabled' : '';
      let tick = isPaid ? '<span class="tick">✓</span>' : '';
      let emiId = 'emi_' + li + '_' + e;
      emiListHtml += `
        <div class="emi-item ${cls}">
          <input type="checkbox" id="${emiId}" data-loan="${li}" data-emi="${e}" data-amount="${l.emi}" data-date="${emiDateStr}" onchange="onEMIChange(this)" ${disabled}>
          <label for="${emiId}">EMI ${e} of ${l.emiCount} — <strong>₹${l.emi.toLocaleString()}</strong> <span class="due-date">(${emiDateStr})</span>${tick}</label>
        </div>`;
    }
    emiListHtml += '</div>';
  });

  if (!emiListHtml) emiListHtml = '<div class="empty-state"><div class="empty-text">No EMI schedule. Add a loan with EMI details.</div></div>';

  // Build loans given list
  let loansHtml = c.loans.length ? c.loans.map((l, idx) => {
    let actualGiven = l.amount - (l.charges || 0);
    let repayable = l.emi && l.emiCount ? l.emi * l.emiCount : actualGiven + (actualGiven * (l.interest || 0) / 100) + (l.charges || 0);
    let emiInfo = l.emi && l.emiCount ? `EMI ₹${l.emi.toLocaleString()} × ${l.emiCount}` : 'No EMI';
    return `<div class="loan-item">
      <div class="loan-row">
        <div>
          <div class="loan-amount">₹${l.amount.toLocaleString()}</div>
          <div class="actual-given">Actual Given: ₹${actualGiven.toLocaleString()}</div>
        </div>
        <div class="loan-date">${l.date}</div>
      </div>
      <div class="loan-detail">${emiInfo} · ${l.interest}% interest · Charges: ₹${(l.charges || 0).toLocaleString()}</div>
      <div class="loan-total">Total Repayable: ₹${repayable.toLocaleString()}</div>
    </div>`;
  }).join('') : '';

  // Build history
  let history = [];
  c.loans.forEach((l, li) => {
    let actualGiven = l.amount - (l.charges || 0);
    let repayable = l.emi && l.emiCount ? l.emi * l.emiCount : actualGiven + (actualGiven * (l.interest || 0) / 100) + (l.charges || 0);
    let emiInfo = l.emi && l.emiCount ? ` (${l.emiCount} × ₹${l.emi})` : '';
    // Get payments for this specific loan using loanIdx
    let loanPayments = c.payments.filter(p => p.loanIdx === li);
    let paidForThisLoan = loanPayments.reduce((sum, p) => sum + p.amount, 0);
    let settled = paidForThisLoan >= repayable;
    history.push({ date: l.date, amt: l.amount, emiInfo, type: 'loan', settled });
  });
  c.payments.forEach(p => history.push({ date: p.date, amt: p.amount, type: 'pay', settled: false }));
  history.sort((a, b) => new Date(b.date) - new Date(a.date));

  let historyHtml = history.length ? history.map(h => {
    let icon = h.type === 'loan' ? '💸' : '💵';
    let cls = h.type === 'loan' ? 'loan' : 'pay';
    let tick = h.settled ? ' <span style="color:var(--success)">✓</span>' : '';
    return `<div class="history-item">
      <div class="history-icon ${cls}">${icon}</div>
      <div class="history-info">
        <div class="history-type">${h.type === 'loan' ? 'Loan Given' : 'Payment'}${tick}</div>
        <div class="history-date">${h.date}</div>
      </div>
      <div class="history-amount ${cls}">₹${h.amt.toLocaleString()}${h.emiInfo || ''}</div>
    </div>`;
  }).join('') : '<div class="empty-state"><div class="empty-text">No transactions yet</div></div>';

  // Build payment list for Record Payment section
  let payListHtml = '';
  let hasEMI = c.loans.some(l => l.emi && l.emiCount);
  if (hasEMI) {
    c.loans.forEach((l, li) => {
      if (!l.emi || !l.emiCount) return;
      let repayable = l.emi * l.emiCount;
      // Count payments specifically for this loan using loanIdx
      let loanPayments = c.payments.filter(p => p.loanIdx === li);
      let cumulativePaid = loanPayments.reduce((a, p) => a + p.amount, 0);

      payListHtml += `<div class="emi-card">
        <div class="emi-header">💰 Loan ₹${l.amount.toLocaleString()} · Charges ₹${(l.charges||0).toLocaleString()} · ${l.interest}% interest</div>`;

      for (let e = 1; e <= l.emiCount; e++) {
        let emiDate = new Date(l.date);
        emiDate.setDate(emiDate.getDate() + (e - 1) * 7);
        let emiDateStr = emiDate.toISOString().split('T')[0];
        let isPaid = loanPayments.some(p => p.emiNum === e || p.date === emiDateStr);
        let cls = isPaid ? 'paid' : '';
        let disabled = isPaid ? 'disabled' : '';
        let tick = isPaid ? '<span class="pay-tick">✓</span>' : '';
        let editBtn = !isPaid ? `<span class="pay-edit" onclick="editPayment(${li},${e})" title="Edit">✏️</span>` : '';
        let delBtn = !isPaid ? `<span class="pay-del" onclick="deletePayment(${li},${e})" title="Delete">🗑️</span>` : '';
        let emiId = 'emi_' + li + '_' + e;
        payListHtml += `
          <div class="pay-item ${cls}">
            <input type="checkbox" id="${emiId}" data-loan="${li}" data-emi="${e}" data-amount="${l.emi}" data-date="${emiDateStr}" onchange="onEMIChange(this)" ${disabled}>
            <div class="pay-info">
              <div class="pay-label">EMI ${e} of ${l.emiCount}</div>
              <div class="pay-date">${emiDateStr}</div>
            </div>
            <div class="pay-amount">₹${l.emi.toLocaleString()}</div>
            ${tick}${editBtn}${delBtn}
          </div>`;
      }
      payListHtml += '</div>';
    });
  } else {
    payListHtml = '<div class="empty-state"><div class="empty-text">No EMI schedule. Add a loan with EMI details first.</div></div>';
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${getInitials(c.name)}</div>
      <div class="detail-name">${c.name}</div>
      <div class="detail-meta">${c.phone || ''} ${c.address ? '· ' + c.address : ''}</div>
      <div style="margin-top:8px;"><span class="badge ${status}">${status === 'paid' ? '✓ Settled' : '⏳ Active'}</span></div>
    </div>

    <div class="mini-grid">
      <div class="mini-stat">
        <div class="label">Loan Amt</div>
        <div class="value">₹${calc.totalGiven.toLocaleString()}</div>
      </div>
      <div class="mini-stat success">
        <div class="label">Actual Given</div>
        <div class="value">₹${calc.actualGiven.toLocaleString()}</div>
      </div>
      <div class="mini-stat">
        <div class="label">Charges</div>
        <div class="value">₹${calc.totalCharges.toLocaleString()}</div>
      </div>
      <div class="mini-stat purple">
        <div class="label">Profit</div>
        <div class="value">₹${calc.profit.toLocaleString()}</div>
      </div>
    </div>

    <div class="stat-row">
      <span class="label">Total Repayable</span>
      <span class="value">₹${(calc.actualGiven + calc.interest + calc.totalCharges).toLocaleString()}</span>
    </div>
    <div class="stat-row">
      <span class="label">Repaid</span>
      <span class="value success">₹${calc.paid.toLocaleString()}</span>
    </div>
    <div class="stat-row">
      <span class="label">Balance</span>
      <span class="value danger">₹${calc.balance.toLocaleString()}</span>
    </div>

    <div class="action-bar">
      <button class="btn btn-secondary btn-sm" onclick="editCustomer()">✏️ Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${selectedIdx})">🗑️ Delete</button>
    </div>

    ${calc.totalGiven > 0 ? `
    <div class="section">
      <div class="section-header">EMI Progress</div>
      ${renderEMISection()}
    </div>` : ''}

    <div class="section">
      <div class="section-header">Loans & Payments</div>
      ${loansHtml || '<div class="empty-state"><div class="empty-text">No loans yet</div></div>'}
    </div>

    ${c.loans.length === 0 ? `
    <div class="loan-form-card">
      <div class="lf-title">➕ Add First Loan</div>
      <div class="loan-form-row">
        <div class="lf-group">
          <label>Loan Amt *</label>
          <input id="loanAmount" placeholder="50000" oninput="previewActual()">
        </div>
        <div class="lf-group">
          <label>Charges *</label>
          <input id="loanCharges" placeholder="5000" oninput="previewActual()">
        </div>
      </div>
      <div class="loan-form-row">
        <div class="lf-group">
          <label>Interest %</label>
          <input id="loanInterest" placeholder="10">
        </div>
        <div class="lf-group">
          <label>EMI Amt</label>
          <input id="loanEMI" placeholder="5000">
        </div>
        <div class="lf-group">
          <label>EMIs</label>
          <input id="loanEMICount" placeholder="10">
        </div>
      </div>
      <input id="loanDate" type="date" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:8px;" value="${new Date().toISOString().split('T')[0]}">
      <div id="actualGivenPreview" style="font-size:12px;color:var(--success);margin-bottom:8px;font-weight:600;"></div>
      <button class="btn btn-primary" onclick="addLoan()">Add Loan</button>
    </div>` : `
    <div class="section">
      <button class="btn btn-secondary btn-sm" onclick="toggleAddLoanForm()" id="addLoanToggle" style="width:100%;margin-bottom:8px;">+ Add More Loan</button>
      <div id="addLoanForm" class="loan-form-card" style="display:none;">
        <div class="lf-title">➕ Add New Loan</div>
        <div class="loan-form-row">
          <div class="lf-group">
            <label>Loan Amt *</label>
            <input id="loanAmount2" placeholder="50000" oninput="previewActual()">
          </div>
          <div class="lf-group">
            <label>Charges *</label>
            <input id="loanCharges2" placeholder="5000" oninput="previewActual()">
          </div>
        </div>
        <div class="loan-form-row">
          <div class="lf-group">
            <label>Interest %</label>
            <input id="loanInterest2" placeholder="10">
          </div>
          <div class="lf-group">
            <label>EMI Amt</label>
            <input id="loanEMI2" placeholder="5000">
          </div>
          <div class="lf-group">
            <label>EMIs</label>
            <input id="loanEMICount2" placeholder="10">
          </div>
        </div>
        <input id="loanDate2" type="date" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:8px;" value="${new Date().toISOString().split('T')[0]}">
        <div id="actualGivenPreview2" style="font-size:12px;color:var(--success);margin-bottom:8px;font-weight:600;"></div>
        <button class="btn btn-primary" onclick="addLoan()">Add Loan</button>
      </div>
    </div>`}

    <div class="section">
      <div class="section-header">Record Payment</div>
      <div id="payList">
        ${payListHtml}
      </div>
    </div>

    <div class="section">
      <div class="section-header">Transaction History</div>
      ${historyHtml}
    </div>`;
}

function toggleAddLoanForm() {
  let el = document.getElementById('addLoanForm');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function addLoan() {
  let amount, charges, interest, emi, emiCount, date;
  if (document.getElementById('loanAmount2')) {
    amount = +document.getElementById('loanAmount2').value;
    charges = +document.getElementById('loanCharges2').value || 0;
    interest = +document.getElementById('loanInterest2').value || 0;
    emi = +document.getElementById('loanEMI2').value || 0;
    emiCount = +document.getElementById('loanEMICount2').value || 0;
    date = document.getElementById('loanDate2').value;
  } else {
    amount = +document.getElementById('loanAmount').value;
    charges = +document.getElementById('loanCharges').value || 0;
    interest = +document.getElementById('loanInterest').value || 0;
    emi = +document.getElementById('loanEMI').value || 0;
    emiCount = +document.getElementById('loanEMICount').value || 0;
    date = document.getElementById('loanDate').value;
  }
  if (!amount) return alert('Enter loan amount');
  if (!charges) return alert('Enter charges amount');
  customers[selectedIdx].loans.push({ amount, charges, interest, emi, emiCount, date });
  save();
  renderDetail();
}

function previewActual() {
  let amount = +document.getElementById('loanAmount').value || 0;
  let charges = +document.getElementById('loanCharges').value || 0;
  let preview = document.getElementById('actualGivenPreview');
  if (preview) {
    let actual = Math.max(0, amount - charges);
    let repayable = actual;
    preview.textContent = 'Actual Given: ₹' + actual.toLocaleString() + ' | Total Repayable: ₹' + repayable.toLocaleString();
  }
  let amount2 = +document.getElementById('loanAmount2').value || 0;
  let charges2 = +document.getElementById('loanCharges2').value || 0;
  let preview2 = document.getElementById('actualGivenPreview2');
  if (preview2) {
    let actual2 = Math.max(0, amount2 - charges2);
    let repayable2 = actual2;
    preview2.textContent = 'Actual Given: ₹' + actual2.toLocaleString() + ' | Total Repayable: ₹' + repayable2.toLocaleString();
  }
}


function onEMIChange(cb) {
  if (cb.checked) {
    customers[selectedIdx].payments.push({ amount: +cb.dataset.amount, date: cb.dataset.date, loanIdx: +cb.dataset.loan, emiNum: +cb.dataset.emi });
    save();
    renderDetail();
  }
}

function editPayment(loanIdx, emiNum) {
  let c = customers[selectedIdx];
  let newDate = prompt('Edit EMI date (YYYY-MM-DD):');
  if (!newDate) return;
  let newAmt = prompt('Edit EMI amount:', c.loans[loanIdx].emi);
  if (!newAmt) return;
  let paymentIdx = c.payments.findIndex(p => p.loanIdx === loanIdx && p.emiNum === emiNum);
  if (paymentIdx >= 0) {
    c.payments[paymentIdx] = { amount: +newAmt, date: newDate, loanIdx: loanIdx, emiNum: emiNum };
  }
  save();
  renderDetail();
}

function deletePayment(loanIdx, emiNum) {
  let c = customers[selectedIdx];
  if (!confirm('Delete this payment?')) return;
  let paymentIdx = c.payments.findIndex(p => p.loanIdx === loanIdx && p.emiNum === emiNum);
  if (paymentIdx >= 0) {
    c.payments.splice(paymentIdx, 1);
  }
  save();
  renderDetail();
}

function renderEMISection() {
  let c = customers[selectedIdx];
  let totalEMI = 0;
  let paidEMI = 0;
  c.loans.forEach((l, li) => {
    if (l.emi && l.emiCount) {
      totalEMI += l.emi * l.emiCount;
      // Sum only payments for this specific loan using loanIdx
      let loanPayments = c.payments.filter(p => p.loanIdx === li);
      paidEMI += loanPayments.reduce((a, p) => a + p.amount, 0);
    }
  });
  let remaining = Math.max(0, totalEMI - paidEMI);
  if (totalEMI === 0) return '<div class="empty-state"><div class="empty-text">No EMI schedule</div></div>';
  let pct = Math.round((paidEMI / totalEMI) * 100);
  return `<div class="progress-wrap">
    <div class="progress-label"><span>₹${paidEMI.toLocaleString()} paid</span><span>₹${totalEMI.toLocaleString()} total</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label" style="margin-top:6px;"><span>${pct}% complete</span><span style="color:var(--danger)">₹${remaining.toLocaleString()} remaining</span></div>
  </div>`;
}

function editCustomer() {
  let c = customers[selectedIdx];
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  editingCustIdx = selectedIdx;
  document.getElementById('formTitle').textContent = 'Edit Customer';
  document.getElementById('saveBtn').textContent = 'Update Customer';
  document.getElementById('fName').value = c.name;
  document.getElementById('fPhone').value = c.phone || '';
  document.getElementById('fAddress').value = c.address || '';
  document.getElementById('fNote').value = c.note || '';
  document.getElementById('fDay').value = c.createdAt ? new Date(c.createdAt).getDay().toString() : '';
  document.getElementById('fName').focus();
}

function updateDashboard() {
  let totalGiven = 0, actualGiven = 0, totalCharges = 0, totalPaid = 0, totalProfit = 0, pendingTotal = 0, activeCount = 0, settledCount = 0;
  customers.forEach(c => {
    let calc = calculate(c);
    totalGiven += calc.totalGiven;
    actualGiven += calc.actualGiven;
    totalCharges += calc.totalCharges;
    totalPaid += calc.paid;
    totalProfit += calc.profit;
    if (calc.balance > 0) { pendingTotal += calc.balance; activeCount++; }
    else settledCount++;
  });
  document.getElementById('statCustomers').textContent = customers.length;
  document.getElementById('statLoanGiven').textContent = '₹' + actualGiven.toLocaleString();
  document.getElementById('statRepayment').textContent = '₹' + totalPaid.toLocaleString();
  document.getElementById('statProfit').textContent = '₹' + totalProfit.toLocaleString();
  document.getElementById('statPending').textContent = '₹' + pendingTotal.toLocaleString();
  document.getElementById('statPendingCustomers').textContent = activeCount;
  document.getElementById('statSettledCustomers').textContent = settledCount;
}

updateDashboard();
renderCustomerList();
</script>
</body>
</html>
